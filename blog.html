        <main>
            <div id="filtergroup">
                <h2 id="filtertitle">search and filter</h2>
                <section id="options">
                
                    <section id="searchbar" class="simplecontainer">
                        <input type="text" id="searchInput" placeholder="search">
                    </section>
                    
                    <section id="filter" class="simplecontainer">
                        <label for="startDate">start date:</label>
                        <input type="date" id="startDate" placeholder="start date">
                        <label for="endDate">end date:</label>
                        <input type="date" id="endDate" placeholder="end date">
                    
                    </section>
                    
                    <section id="tags" class="simplecontainer">
                        <label>tags</label>
                        <div id="tagOptions">
                            <!-- tag buttons appear here -->
                        </div>
                
                    </section>
                </section>
            </div>

            <section id="blogcontainer" class="simplecontainer">
                <div id="blogposts" class="content">
                    <!-- blog posts appear here-->   
                </div>
            </section>
        </main>
 
        <input type="checkbox" id="musicToggle" hidden>
        <label for="musicToggle" id="musicplayer-tab">music</label>

        <section id="musicplayer">
            <p></p>
            <div id="content"> 
                <audio id="audio" preload="metadata" tabindex="none"></audio>
                <select id="songSelect">
                    <option value="">select a song</option>
                </select>
                <div id="time-container">
                    <span id="currentTime">0:00</span>
                    <div id="progress-bar"><div id="progress-fill"></div></div>
                    <span id="totalTime">0:00</span>
                </div>
                <div id="player">
                    <button id="play" type="button">play</button>
                    <button id="pause" type="button">pause</button>
                    <button id="stop" type="button">stop</button>
                    <div id="volume-container">
                        <label for="volume">volume</label>
                        <input type="range" id="volume" min="0" max="100" value="50">
                    </div>
                </div>
            </div>  
        </section>
